name: Performance Regression Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  performance-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build application
        working-directory: registraduria
        run: mvn clean package -Dmaven.test.skip=true

      - name: Start Spring Boot application
        working-directory: registraduria
        run: |
          nohup mvn spring-boot:run -Dmaven.test.skip=true > app.log 2>&1 &
          sleep 20

      - name: Verify application is running
        run: |
          curl -X POST "http://localhost:8080/register" \
            -H "Content-Type: application/json" \
            -d '{"name":"CI Test","id":999001,"age":30,"gender":"MALE","alive":true}'

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 regression test
        run: |
          mkdir -p perf/results
          k6 run perf/scripts/register_person_k6.js \
            --env BASE_URL=http://localhost:8080 \
            --env SCENARIO=regression \
            --env RUN_ID=90 \
            --summary-export=perf/results/ci-regression-summary.json

      - name: Upload k6 summary
        uses: actions/upload-artifact@v4
        with:
          name: k6-regression-summary
          path: perf/results/ci-regression-summary.json